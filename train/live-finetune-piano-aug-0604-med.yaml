data:
  train_urls:
      - "/nlp/scr/npbecker/lmd_full_tokens/06042024/06042024.autoregress.train.txt"
  validation_urls:
      - "/nlp/scr/npbecker/lmd_full_tokens/06042024/06042024_valid.autoregress.valid.txt"
  cache_dir: "/juice4/scr4/nlp/music/cache-tmp-2"
  tokenizer: "passthrough"
  plaintext: True
  vocab_size: 55287
  enforce_eos: False
model:
  type: gpt2
  hidden_dim: 1024
  num_heads: 16
  num_layers: 24
  seq_len: 1024
  scale_attn_by_inverse_layer_idx: true
  embed_pdrop: 0.1
  resid_pdrop: 0.1
  gradient_checkpointing: true
initialize_from_hf: /juice4/scr4/nlp/music/lakh-checkpoints/futile-think-tank-272/step-800000/hf
trainer:
  mp: p=f32,c=bfloat16
  model_axis_size: 1
  per_device_parallelism: 16
  num_train_steps: 2001
  train_batch_size: 512
  per_device_eval_parallelism: 1

  checkpointer:
    base_path: /juice4/scr4/nlp/music/prelim-checkpoints/live-finetune-piano-aug-0604-med
    save_interval: 30m
    keep:
      - every: 1000

  axis_resources:
    batch: "data"
    vocab: "model"
    mlp: "model"
    heads: "model"
  parameter_axis_resources:
    embed: "data"
optimizer:
  learning_rate: 3E-5
  weight_decay: 0.1
  min_lr_ratio: 0.1
